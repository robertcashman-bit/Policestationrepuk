  <text x="208" y="107" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="700">Custody Note - Attendance Record</text>
  <rect x="72" y="156" width="236" height="484" rx="18" fill="#FFFFFF"/>
  <text x="96" y="198" fill="#0F172A" font-family="Arial, sans-serif" font-size="24" font-weight="700">Case sections</text>
  <rect x="96" y="224" width="188" height="42" rx="10" fill="#FEF3C7"/>
  <text x="116" y="251" fill="#92400E" font-family="Arial, sans-serif" font-size="18" font-weight="700">1. Arrival and custody</text>
  <rect x="96" y="282" width="188" height="42" rx="10" fill="#DBEAFE"/>
  <text x="116" y="309" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="18" font-weight="700">2. Disclosure</text>
  <rect x="96" y="340" width="188" height="42" rx="10" fill="#DCFCE7"/>
  <text x="116" y="367" fill="#166534" font-family="Arial, sans-serif" font-size="18" font-weight="700">3. Consultation</text>
  <rect x="96" y="398" width="188" height="42" rx="10" fill="#FCE7F3"/>
  <text x="116" y="425" fill="#9D174D" font-family="Arial, sans-serif" font-size="18" font-weight="700">4. Interview</text>
  <rect x="96" y="456" width="188" height="42" rx="10" fill="#EDE9FE"/>
  <text x="116" y="483" fill="#6D28D9" font-family="Arial, sans-serif" font-size="18" font-weight="700">5. Outcome and fees</text>
  <rect x="332" y="156" width="532" height="484" rx="18" fill="#FFFFFF"/>
  <text x="360" y="198" fill="#0F172A" font-family="Arial, sans-serif" font-size="30" font-weight="700">Consultation notes</text>
  <rect x="360" y="224" width="476" height="72" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="384" y="254" fill="#334155" font-family="Arial, sans-serif" font-size="19">Client advised on allegation summary, disclosure gaps, and interview strategy.</text>
  <text x="384" y="281" fill="#64748B" font-family="Arial, sans-serif" font-size="17">Structured prompts reduce missed details when the station is busy.</text>
  <rect x="360" y="322" width="220" height="126" rx="14" fill="#0F172A"/>
  <text x="384" y="360" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700">LAA fields</text>
  <text x="384" y="394" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="18">Outcome code</text>
  <text x="384" y="420" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="18">Stage reached</text>
  <text x="384" y="446" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="18">DSCC PIN</text>
  <rect x="604" y="322" width="232" height="126" rx="14" fill="#FEF3C7"/>
  <text x="628" y="360" fill="#92400E" font-family="Arial, sans-serif" font-size="22" font-weight="700">Review prompts</text>
  <text x="628" y="394" fill="#92400E" font-family="Arial, sans-serif" font-size="18">PACE reviews logged</text>
  <text x="628" y="420" fill="#92400E" font-family="Arial, sans-serif" font-size="18">Authorities captured</text>
  <text x="628" y="446" fill="#92400E" font-family="Arial, sans-serif" font-size="18">Supervisor sign-off ready</text>
  <rect x="360" y="474" width="476" height="134" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="384" y="510" fill="#0F172A" font-family="Arial, sans-serif" font-size="22" font-weight="700">Interview summary</text>
  <text x="384" y="546" fill="#334155" font-family="Arial, sans-serif" font-size="18">Questions, answers, no comment decisions, and disclosure issues all stay in one record.</text>
  <text x="384" y="580" fill="#334155" font-family="Arial, sans-serif" font-size="18">That makes the handover cleaner and the later billing note faster to complete.</text>
