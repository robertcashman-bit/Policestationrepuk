# Optional: add repository secret VERCEL_DEPLOY_HOOK = URL from Vercel → Project → Settings → Git → Deploy Hooks (Production).
# Then each push to master/main will trigger a fresh production build after CI passes.
name: Trigger Vercel production (deploy hook)
on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  hook:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set — add a Production deploy hook URL in Vercel, then add it as this repo secret."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Deploy hook invoked."
